<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 160" role="img" aria-label="Shashi Lab — University of Hyderabad">
  <defs>
    <linearGradient id="badgeBg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="ubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Badge circle -->
  <circle cx="80" cy="80" r="72" fill="url(#badgeBg)"/>
  <circle cx="80" cy="80" r="68" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- DNA double helix — two strands crossing at the centre -->
  <path d="M80,18 C52,38 52,62 80,80 C108,98 108,122 80,142"
        stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M80,18 C108,38 108,62 80,80 C52,98 52,122 80,142"
        stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Base-pair rungs (upper half) -->
  <line x1="67" y1="32"  x2="93"  y2="32"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="50"  x2="103" y2="50"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="68"  x2="104" y2="68"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <!-- Base-pair rungs (lower half — strands have swapped sides) -->
  <line x1="56" y1="94"  x2="104" y2="94"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="112" x2="103" y2="112" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="67" y1="130" x2="93"  y2="130" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>

  <!-- Ubiquitin tag 1 — upper right, attached at y=50 -->
  <line x1="103" y1="50" x2="117" y2="41" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="129" cy="33" r="14" fill="url(#ubGrad)"/>
  <text x="129" y="33" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Ub</text>

  <!-- Ubiquitin tag 2 — lower left, attached at y=112 -->
  <line x1="57" y1="112" x2="43" y2="121" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="31" cy="129" r="14" fill="url(#ubGrad)" opacity="0.9"/>
  <text x="31" y="129" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Ub</text>

  <!-- Lab name -->
  <text x="178" y="76"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="46" font-weight="900" fill="#1e3a8a">Shashi</text>
  <text x="178" y="116"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="40" font-weight="900" fill="#2563eb" letter-spacing="3">Lab</text>

  <!-- Thin rule -->
  <line x1="178" y1="127" x2="404" y2="127" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Institution line -->
  <text x="178" y="144"
        font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="0.3">
    University of Hyderabad · Biochemistry
  </text>
</svg>
